name: 'AWS MGN Automation CD'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'backend/**'
      - 'waves/**'
      - '.github/workflows/release.yml'

jobs:
  validate-and-test:
    name: 'Migration Logic Validation'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v3

    - name: Run Pytest
      run: |
        pip install pytest fastapi httpx
        pytest tests/

  build-and-push:
    name: 'Platform Release'
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1

    - name: Build & Push MGN API
      run: |
        aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 123456789012.dkr.ecr.eu-west-1.amazonaws.com
        docker build -t 123456789012.dkr.ecr.eu-west-1.amazonaws.com/devopstrio/mgn-automation-api:${{ github.sha }} ./backend
        docker push 123456789012.dkr.ecr.eu-west-1.amazonaws.com/devopstrio/mgn-automation-api:${{ github.sha }}

  eks-rollout:
    name: 'EKS Rollout'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Set EKS Context
      run: |
        aws eks update-kubeconfig --region eu-west-1 --name eks-mgn-automation-prd

    - name: Helm Deploy
      run: |
        helm upgrade --install mgn-automation ./helm/aws-mgn-automation \
        --namespace mgn-factory-prod --create-namespace \
        --set api.image.tag=${{ github.sha }}
